name: Typecheck

# Fast, secret-free TypeScript gate. Runs `tsc --noEmit` on every PR (including
# forks, which Vercel does not build a preview for) and on pushes to main.
# Catches the class of error that broke PR #13 — a type error fails `next build`
# on Vercel, but only after merge; this surfaces it on the PR instead.

on:
  pull_request:
  push:
    branches: [main]

# Newer push to the same branch/PR cancels the older run.
concurrency:
  group: typecheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
