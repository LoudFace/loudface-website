  <rect width="10" height="7" transform="matrix(0.866025 0.5 0 1 11.34 5.5)" fill="#F0F5F4" stroke="black" stroke-width="0.4"/>
  <rect width="10" height="7" transform="matrix(0.866025 -0.5 0 1 20 5.5)" fill="#F0F5F4" stroke="black" stroke-width="0.4"/>

  <!-- Block 2: Bottom left -->
  <rect width="10" height="8" transform="matrix(0.866025 0.5 -0.866025 0.5 8.66 17)" fill="#F0F5F4" stroke="black" stroke-width="0.4"/>
  <rect width="10" height="7" transform="matrix(0.866025 0.5 0 1 0 22)" fill="#F0F5F4" stroke="black" stroke-width="0.4"/>
  <rect width="10" height="7" transform="matrix(0.866025 -0.5 0 1 8.66 22)" fill="#F0F5F4" stroke="black" stroke-width="0.4"/>

  <!-- Block 3: Bottom right -->
