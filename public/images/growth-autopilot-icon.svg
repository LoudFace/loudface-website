  <rect width="10" height="7" transform="matrix(0.866025 0.5 0 1 22.68 22)" fill="#F0F5F4" stroke="black" stroke-width="0.4"/>
  <rect width="10" height="7" transform="matrix(0.866025 -0.5 0 1 31.34 22)" fill="#F0F5F4" stroke="black" stroke-width="0.4"/>

  <!-- Connecting arrows — clockwise cycle -->
